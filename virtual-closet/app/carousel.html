<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>the archive.</title>
<style>
  /* SYVE-style carousel (design-inspo/fashion-site-instruction.md), wired to the closet */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100vh; overflow: hidden; background: #fff; overscroll-behavior: none; }
  body, button {
    font-family: 'SuisseIntl', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 600; font-size: 12px; text-transform: uppercase;
    line-height: 16px; color: #000;
  }
  #viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; background: #fff; }

  #logo {
    position: absolute; top: 10px; left: calc(50% + 4px); transform: translateX(-50%);
    z-index: 10; font-size: 26px; font-weight: 800; font-style: italic;
    letter-spacing: -0.02em;
    text-transform: lowercase; white-space: nowrap; user-select: none;
  }
  nav { position: absolute; top: 12px; z-index: 10; }
  #nav-left { left: 12px; }
  #nav-right { right: 12px; text-align: right; width: 120px; }
  nav a, nav span { display: block; cursor: pointer; text-decoration: none; color: #000; }
  nav .spacer { height: 16px; }
  nav .on { text-decoration: underline; }
  nav .quiet { cursor: default; }

  .carousel-img { position: absolute; will-change: transform; cursor: pointer; }
  .carousel-img img { width: 100%; height: 100%; object-fit: contain; display: block; }

  #info {
    position: absolute; left: 12px; bottom: 12px; width: 350px; z-index: 10;
    border: 1px solid #000; padding: 12px; background: #fff;
  }
  #info .desc { margin-top: 32px; }
  #controls { position: absolute; right: 12px; bottom: 12px; width: 350px; z-index: 10; }
  .ctrl-row {
    height: 40px; border: 1px solid #000; background: #fff;
    display: flex; align-items: center; padding: 0 12px; gap: 12px;
  }
  .ctrl-row + .ctrl-row { margin-top: -1px; }
  #sizes { display: flex; gap: 10px; flex: 1; }
  #sizes span { cursor: pointer; }
  #sizes .on { text-decoration: underline; }
  #colors { display: flex; gap: 6px; }
  #colors div { width: 10px; height: 10px; border: 1px solid #000; }
  #price { flex: 1; }
  #cta {
    background: #000; color: #fff; border: 0; height: 28px; padding: 0 18px;
    cursor: pointer; font-size: 11px; letter-spacing: 0.04em;
  }
  #cta:disabled { opacity: 0.4; cursor: wait; }

  /* hero detail state */
  #detail {
    position: fixed; inset: 0; z-index: 20;
    background: rgba(255, 255, 255, 0.92);
    display: flex; align-items: center; justify-content: center;
  }
  #detail[hidden] { display: none; }
  #detail-box {
    display: flex; gap: 24px; background: #fff; border: 1px solid #000;
    padding: 24px; max-width: 860px; max-height: 84vh;
  }
  #detail-img { max-height: calc(84vh - 48px); max-width: 440px; object-fit: contain; }
  #detail-side { width: 280px; display: flex; flex-direction: column; }
  #detail-title { font-weight: 800; margin-bottom: 16px; }
  .d-row { border-top: 1px solid #000; padding: 8px 0; }
  #detail-items .d-row:last-child { border-bottom: 1px solid #000; }
  #detail-meta { margin-top: 12px; font-size: 11px; }
  #detail-actions { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
  #detail-actions button {
    height: 32px; border: 1px solid #000; background: #fff; cursor: pointer;
    font-size: 11px; letter-spacing: 0.04em;
  }
  #detail-actions button:hover { background: #000; color: #fff; }
  #detail-actions #detail-open { background: #000; color: #fff; }
  #detail-actions #detail-open:hover { opacity: 0.8; }
  #detail-actions button:disabled { opacity: 0.4; cursor: wait; }
  .d-brand-line { font-weight: 800; margin-bottom: 4px; }
  .d-row .d-brand { font-weight: 800; }

  /* ── ASCII entrance (design_handoff_ascii_entrance; shows once per session) ── */
  #entrance { position: fixed; inset: 0; z-index: 100; background: #fff; cursor: pointer; }
  #entrance[hidden] { display: none; }
  /* the crop matches the viewport aspect, so pinning to 100vw/100vh is
     distortion-free; !important beats the module's inline sizing */
  #entrance canvas { display: block; width: 100vw !important; height: 100vh !important; }
  #entrance-label {
    position: absolute; left: 50%; bottom: 6vh; transform: translateX(-50%);
    font-style: italic; text-transform: lowercase; font-size: 15px;
    letter-spacing: 0.01em; background: rgba(255, 255, 255, 0.88);
    padding: 8px 18px; white-space: nowrap; transition: opacity 0.9s ease;
  }
  #entrance.dispelling { background: transparent; } /* photo fade reveals the live carousel */
  #entrance.dispelling #entrance-label { opacity: 0; }

  /* the hero morphs into the fitting-room stage on navigation */
  @view-transition { navigation: auto; }
  ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 0.35s; }
  ::view-transition-group(figure),
  ::view-transition-old(figure), ::view-transition-new(figure) {
    animation-duration: 0.55s;
    animation-timing-function: cubic-bezier(0.33, 0, 0.2, 1);
  }
  /* read-only demo (static export, body.demo via manifest): sourcing is
     local-only and the try-on/re-render CTA has no server behind it */
  body.demo a[href="/sourcing"], body.demo #cta { display: none !important; }
</style>
</head>
<body>
<div id="viewport">
  <div id="logo">the archive.</div>
  <nav id="nav-left">
    <span class="filter on" data-f="all">All</span>
    <div class="spacer"></div>
    <span class="filter" data-f="top">Tops</span>
    <span class="filter" data-f="bottom">Bottoms</span>
    <span class="filter" data-f="dress">Dresses</span>
    <span class="filter" data-f="outerwear">Outerwear</span>
    <span class="filter" data-f="shoes">Shoes</span>
    <span class="filter" data-f="outfit">Outfits</span>
    <div class="spacer"></div>
    <a href="/fitting-room">Fitting room</a>
    <a href="/sourcing">Sourcing</a>
  </nav>
  <nav id="nav-right">
    <span class="quiet" id="nav-avatar"></span>
    <div class="spacer"></div>
    <span class="quiet" id="nav-gen"></span>
    <span class="quiet" id="nav-cost"></span>
  </nav>
  <div id="stage-items"></div>
  <div id="info"><div class="title" id="info-title"></div><div class="desc" id="info-desc"></div></div>
  <div id="controls">
    <div class="ctrl-row"><div id="sizes"></div><div id="colors"></div></div>
    <div class="ctrl-row"><div id="price"></div><button id="cta">Try on</button></div>
  </div>
  <div id="detail" hidden>
    <div id="detail-box">
      <img id="detail-img" alt="">
      <div id="detail-side">
        <div id="detail-title"></div>
        <div id="detail-items"></div>
        <div id="detail-meta"></div>
        <div id="detail-actions">
          <button id="detail-open">Open in fitting room</button>
          <button id="detail-close">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="entrance" hidden>
  <canvas id="entrance-canvas"></canvas>
  <div id="entrance-label">enter the archive.</div>
</div>

<script>
const PLACEHOLDER = 'data:image/svg+xml,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="620" height="835" viewBox="0 0 620 835">' +
  '<rect width="620" height="835" fill="#E8DDD3"/></svg>');
const REF_W = 1440, REF_H = 900;
const DWELL = 80, EASE = 0.08;

let M = null;          // manifest
let ALL_ITEMS = [];    // every item
let items = [];        // filtered view
let els = [];          // DOM nodes parallel to items
let scrollPos = 0, target = 0, isSnapped = true, dwellAccum = 0;
let SLOTS = {};
let detailOpen = false;       // while open, #detail-img carries the morph name
let suppressFigure = false;   // plain nav links crossfade instead of morphing
let entranceActive = false;   // ASCII entrance cover is up (blocks carousel scroll)

const $ = (s) => document.querySelector(s);

function swatches(color) {
  const c = (color || '').toLowerCase();
  const out = [];
  if (c.includes('black')) out.push('#141414');
  if (c.includes('charcoal') || c.includes('grey') || c.includes('gray')) out.push('#4a4d52');
  if (c.includes('red') || c.includes('crimson')) out.push('#8e1f2f');
  if (c.includes('blue') || c.includes('cobalt')) out.push('#1f3f8e');
  return out.length ? out.slice(0, 4) : ['#141414'];
}

function buildItems() {
  ALL_ITEMS = [];
  M.garments.forEach((g) => {
    const src = g.cutout || (g.renders.length ? g.renders[g.renders.length - 1] : null);
    if (!src) return;   // not rendered yet — lives in the fitting room racks only
    ALL_ITEMS.push({
      kind: 'garment', cat: g.category, gid: g.id,
      title: g.name, desc: [g.fabric, g.fit].filter(Boolean).join('. '),
      src,
      colors: swatches(g.color),
      size: g.size_owned || null,
    });
  });
  (M.looks || []).forEach((l) => {
    if (l.state !== 'published') return;   // drafts live in the fitting room
    const names = l.items.map((gid) => {
      const g = M.garments.find((x) => x.id === gid);
      if (!g) return gid;
      return g.size_owned ? `${g.name} (${g.size_owned})` : g.name;
    });
    ALL_ITEMS.push({
      kind: 'look', cat: 'outfit', lookId: l.id, items: l.items, pose: l.pose,
      title: l.title, desc: names.join('. '),
      src: l.cutout || l.render, colors: ['#141414'],
    });
  });
}

function buildSlots() {
  var vw = window.innerWidth, vh = window.innerHeight;
  var sx = vw / REF_W, sy = vh / REF_H;
  var fullH = (835 - 40) * sy;
  var heroH = fullH * 0.85;          // 15% smaller than spec; same visual center
  var heroTop = 58 * sy;
  var heroCy = heroTop + fullH / 2;
  var heroW = 620 * sx * 0.85;
  var thumbH = (194 - 40 * (194 / 835)) * sy;
  var thumbW = 144 * sx;
  var thumbCy = vh * 0.5;
  SLOTS = {
    '-3': { cx: -80 * sx,  cy: thumbCy, w: thumbW, h: thumbH, opacity: 0, z: 1 },
    '-2': { cx: 144 * sx,  cy: thumbCy, w: thumbW, h: thumbH, opacity: 1, z: 2 },
    '-1': { cx: 368 * sx,  cy: thumbCy, w: thumbW, h: thumbH, opacity: 1, z: 3 },
     '0': { cx: vw / 2,    cy: heroCy,  w: heroW,  h: heroH,  opacity: 1, z: 5 },
     '1': { cx: 1072 * sx, cy: thumbCy, w: thumbW, h: thumbH, opacity: 1, z: 3 },
     '2': { cx: 1296 * sx, cy: thumbCy, w: thumbW, h: thumbH, opacity: 1, z: 2 },
     '3': { cx: 1520 * sx, cy: thumbCy, w: thumbW, h: thumbH, opacity: 0, z: 1 },
  };
}
window.addEventListener('resize', buildSlots);

function getSlot(offset) {
  const clamped = Math.max(-3, Math.min(3, offset));
  const lo = Math.floor(clamped), hi = Math.ceil(clamped), t = clamped - lo;
  const a = SLOTS[String(lo)], b = SLOTS[String(hi)];
  return {
    cx: a.cx + (b.cx - a.cx) * t,
    cy: a.cy + (b.cy - a.cy) * t,
    w:  a.w  + (b.w  - a.w)  * t,
    h:  a.h  + (b.h  - a.h)  * t,
    opacity: a.opacity + (b.opacity - a.opacity) * t,
    z: Math.round(a.z + (b.z - a.z) * t),
  };
}

function normalizeOffset(offset) {
  const TOTAL = items.length;
  offset = offset % TOTAL;
  if (offset > TOTAL / 2) offset -= TOTAL;
  if (offset < -TOTAL / 2) offset += TOTAL;
  return offset;
}

function mount(filter) {
  items = ALL_ITEMS.filter((it) => filter === 'all' || it.cat === filter);
  const host = $('#stage-items');
  host.innerHTML = '';
  els = items.map((it, i) => {
    const d = document.createElement('div');
    d.className = 'carousel-img';
    const img = document.createElement('img');
    img.src = it.src || PLACEHOLDER;
    img.onerror = () => { img.src = PLACEHOLDER; };
    d.appendChild(img);
    d.addEventListener('click', () => {
      if (Math.round(Math.abs(normalizeOffset(i - scrollPos))) === 0) openDetail(items[i]);
      else centerOn(i);
    });
    host.appendChild(d);
    return d;
  });
  scrollPos = target = 0; isSnapped = true; dwellAccum = 0;
  updateInfo();
}

function layout() {
  const TOTAL = items.length;
  els.forEach((el, i) => {
    const off = normalizeOffset(i - scrollPos);
    if (Math.abs(off) > 3.02) { el.style.display = 'none'; return; }
    const s = getSlot(off);
    el.style.display = 'block';
    el.style.width = s.w + 'px';
    el.style.height = s.h + 'px';
    el.style.opacity = s.opacity;
    el.style.zIndex = s.z;
    el.style.transform = `translate(${s.cx - s.w / 2}px, ${s.cy - s.h / 2}px)`;
    // only ONE element may carry the cross-page transition name: the hero —
    // unless the detail overlay is open (its image anchors the morph instead)
    el.style.viewTransitionName =
      (!suppressFigure && !detailOpen && Math.abs(off) < 0.5) ? 'figure' : 'none';
  });
}

function centeredIndex() {
  const TOTAL = items.length;
  return ((Math.round(scrollPos) % TOTAL) + TOTAL) % TOTAL;
}

function updateInfo() {
  const it = items[centeredIndex()];
  if (!it) return;
  $('#info-title').textContent = it.title;
  $('#info-desc').textContent = it.desc;
  const sizes = ['XS', 'S', 'M', 'L'];
  if (it.size && !sizes.includes(it.size)) sizes.push(it.size);
  $('#sizes').innerHTML = sizes.map((s) =>
    `<span class="${s === it.size ? 'on' : ''}">${s}</span>`).join('');
  $('#colors').innerHTML = it.colors.map((c) => `<div style="background:${c}"></div>`).join('');
  $('#price').textContent = M.demo ? 'archive demo'
    : M.generation_enabled ? '$0.06 / render' : 'copy-prompt mode';
  $('#cta').textContent = it.kind === 'look' ? 'Re-render look' : 'Try on';
}

function moveCarousel(dir) {
  target = scrollPos + dir;   // continuous position; wrapping handled per-item
  isSnapped = false;
}

function centerOn(i) {
  const off = normalizeOffset(i - scrollPos);   // shortest way around the wrap
  if (Math.round(Math.abs(off)) === 0) return;  // already the hero
  target = Math.round(scrollPos + off);
  isSnapped = false;
}

function handleScroll(delta) {
  if (entranceActive) return;   // don't drift the carousel behind the entrance cover
  if (isSnapped) {
    dwellAccum += delta;
    if (Math.abs(dwellAccum) > DWELL) {
      moveCarousel(dwellAccum > 0 ? 1 : -1);
      dwellAccum = 0;
    }
  }
}

window.addEventListener('wheel', (e) => {
  e.preventDefault();   // keep horizontal swipes from firing the browser back/forward gesture
  const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
  handleScroll(d);
}, { passive: false });

let touchLastX = null;
window.addEventListener('touchstart', (e) => { touchLastX = e.touches[0].clientX; }, { passive: true });
window.addEventListener('touchmove', (e) => {
  if (touchLastX == null) return;
  handleScroll(touchLastX - e.touches[0].clientX);
  touchLastX = e.touches[0].clientX;
}, { passive: true });
window.addEventListener('touchend', () => { touchLastX = null; });

function tick() {
  if (!isSnapped) {
    scrollPos += (target - scrollPos) * EASE;
    if (Math.abs(target - scrollPos) < 0.001) {
      scrollPos = target; isSnapped = true; dwellAccum = 0;
      updateInfo();
    }
  }
  layout();
  requestAnimationFrame(tick);
}

document.addEventListener('click', (e) => {
  const f = e.target.closest('.filter');
  if (!f) return;
  document.querySelectorAll('.filter').forEach((x) => x.classList.toggle('on', x === f));
  mount(f.dataset.f);
});

async function renderHero() {
  const it = items[centeredIndex()];
  if (!it || !M.generation_enabled) return;
  const btn = $('#cta');
  btn.disabled = true; btn.textContent = 'Rendering…';
  try {
    let src = null;
    if (it.kind === 'look') {   // re-publish with its assigned pose; updates looks.json
      const r = await fetch('/api/publish', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: it.lookId, pose: it.pose || 'front' }),
      });
      const j = await r.json();
      if (r.ok && j.look) { src = j.look.cutout || j.look.render; it.pose = j.look.pose; }
    } else {
      const r = await fetch('/api/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ garment: it.gid }),
      });
      const j = await r.json();
      if (r.ok && j.render) src = j.render;   // boxed until the next cutout pass
    }
    if (src) {
      it.src = src;
      els[items.indexOf(it)].querySelector('img').src = src;
      if (!$('#detail').hidden) $('#detail-img').src = src;
      M = await (await fetch('/api/manifest')).json();
      $('#nav-cost').textContent = `$${M.spend.spent_usd.toFixed(2)} / $${M.spend.cap_usd.toFixed(0)}`;
    }
  } finally {
    btn.disabled = false;
    updateInfo();
  }
}
$('#cta').addEventListener('click', renderHero);

/* ── hero detail state (the junction between archive and fitting room) ── */
let detailItem = null;
function openDetail(it) {
  detailItem = it;
  $('#detail-img').src = it.src || PLACEHOLDER;
  const gids = it.kind === 'look' ? it.items : [it.gid];
  if (it.kind === 'look') {
    $('#detail-title').textContent = it.title;
    $('#detail-items').innerHTML = gids.map((gid) => {
      const g = M.garments.find((x) => x.id === gid);
      if (!g) return `<div class="d-row">${gid}</div>`;
      const brand = g.brand ? `<span class="d-brand">${g.brand}</span> · ` : '';
      return `<div class="d-row">${brand}${g.name}${g.size_owned ? ` — ${g.size_owned}` : ''}</div>`;
    }).join('');
    $('#detail-meta').textContent = `pose: ${it.pose || 'front'}`;
  } else {
    // brand is the headline; the garment name lives in the row below only
    const g = M.garments.find((x) => x.id === it.gid);
    $('#detail-title').textContent = (g && g.brand) || it.title;
    $('#detail-items').innerHTML =
      `<div class="d-row">${it.title}${g && g.size_owned ? ` — ${g.size_owned}` : ''}</div>`;
    $('#detail-meta').textContent = it.desc || '';
  }
  $('#detail').hidden = false;
  detailOpen = true;
  $('#detail-img').style.viewTransitionName = 'figure';
}
function closeDetail() {
  $('#detail').hidden = true;
  detailOpen = false;
  $('#detail-img').style.viewTransitionName = 'none';
}
$('#detail-close').addEventListener('click', closeDetail);
$('#detail').addEventListener('click', (e) => { if (e.target.id === 'detail') closeDetail(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });
$('#detail-open').addEventListener('click', () => {
  if (!detailItem) return;
  const items_ = detailItem.kind === 'look' ? detailItem.items : [detailItem.gid];
  localStorage.setItem('incomingLook', JSON.stringify({
    title: detailItem.title, items: items_, kind: detailItem.kind,
  }));
  location.href = '/fitting-room';
});

// plain header navigation gets a quiet crossfade, not a figure-to-figure morph
document.querySelector('#nav-left a[href="/fitting-room"]').addEventListener('click', () => {
  suppressFigure = true;
  els.forEach((el) => { el.style.viewTransitionName = 'none'; });
  $('#detail-img').style.viewTransitionName = 'none';
});

async function boot() {
  M = await (await fetch('/api/manifest')).json();
  if (M.demo) document.body.classList.add('demo');   // static export: dead-end controls hidden via CSS
  $('#nav-avatar').textContent = M.avatar.locked_version || 'draft';
  $('#nav-gen').textContent = M.demo ? 'Archive demo'
    : M.generation_enabled ? 'Generation live' : 'Copy-prompt';
  $('#nav-cost').textContent = `$${M.spend.spent_usd.toFixed(2)} / $${M.spend.cap_usd.toFixed(0)}`;
  buildItems();
  buildSlots();
  mount('all');
  tick();
}
boot();

/* ── ASCII entrance ──────────────────────────────────────────────────────
   Edge-trace cover per design-inspo/design_handoff_ascii_entrance, in the
   SYVE skin Janice approved 07-15: grayscale photo cropped to the viewport,
   black monospace glyphs (the handoff's text passage) tracing its contours,
   deep shimmer at rest. Click: glyphs pulse under a decaying envelope until
   they stop reappearing while the photo fades out, revealing the live
   carousel. Shows once per browser session; skipped for reduced-motion.
   Debug: ?entrance=1 forces it, ?entrance=0 suppresses it. */

const ENTRANCE_TEXT =
  'We are all filled with a longing for the wild. There are few culturally sanctioned antidotes for this yearning. We were taught to feel shame for this desire. We grew our hair long and used it to hide our feelings. But the shadow of the Wild Woman still lurks behind us during our days and in our nights. No matter where we are, the shadow that trots behind is definitely four-footed. ';

function createAsciiEntrance(canvas, opts) {
  let api = { dispel: () => {}, destroy: () => {} };
  let destroyed = false;

  const img = new Image();
  img.onload = () => {
    const fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    fontsReady.then(() => { if (!destroyed) boot(img); });
  };
  img.src = opts.src;

  function boot(img) {
    const cssW = opts.width;
    const W = cssW * 2;                       // 2x internal resolution
    const H = Math.round(W * (img.height / img.width));
    canvas.width = W; canvas.height = H;
    canvas.style.width = cssW + 'px';
    canvas.style.height = (H / 2) + 'px';
    const ctx = canvas.getContext('2d');

    const fs = opts.charSize * 2;
    const font = fs + "px 'IBM Plex Mono', monospace";
    const cellW = Math.max(4, Math.round(fs * 0.6));
    const cellH = Math.max(6, Math.round(fs * 1.02));
    const cols = Math.ceil(W / cellW), rows = Math.ceil(H / cellH);

    // sample luminance at grid resolution, contrast-normalize (2nd–98th pct)
    const sc = document.createElement('canvas'); sc.width = cols; sc.height = rows;
    const sx = sc.getContext('2d', { willReadFrequently: true });
    sx.drawImage(img, 0, 0, cols, rows);
    const px = sx.getImageData(0, 0, cols, rows).data;
    const lum = new Float32Array(cols * rows);
    for (let i = 0; i < cols * rows; i++)
      lum[i] = (0.299 * px[i * 4] + 0.587 * px[i * 4 + 1] + 0.114 * px[i * 4 + 2]) / 255;
    const sorted = Float32Array.from(lum).sort();
    const lo = sorted[Math.floor(sorted.length * 0.02)];
    const hi = sorted[Math.floor(sorted.length * 0.98)];
    const rng = Math.max(0.05, hi - lo);
    for (let i = 0; i < lum.length; i++) lum[i] = Math.min(1, Math.max(0, (lum[i] - lo) / rng));

    // Sobel edge magnitude decides which cells get a character
    const mag = new Float32Array(cols * rows);
    for (let r = 1; r < rows - 1; r++) for (let c = 1; c < cols - 1; c++) {
      const i = r * cols + c;
      const gx = (lum[i - cols + 1] + 2 * lum[i + 1] + lum[i + cols + 1]) - (lum[i - cols - 1] + 2 * lum[i - 1] + lum[i + cols - 1]);
      const gy = (lum[i + cols - 1] + 2 * lum[i + cols] + lum[i + cols + 1]) - (lum[i - cols - 1] + 2 * lum[i - cols] + lum[i - cols + 1]);
      mag[i] = Math.sqrt(gx * gx + gy * gy);
    }

    const mk = () => { const c = document.createElement('canvas'); c.width = W; c.height = H; return c; };
    const base = mk(), bx = base.getContext('2d');
    bx.drawImage(img, 0, 0, W, H);
    bx.fillStyle = opts.veil;
    bx.fillRect(0, 0, W, H);

    // characters drawn sequentially from the passage into 4 twinkle layers
    const inten = opts.intensity;
    const eThresh = 0.3 + (1 - inten) * 0.45;
    const eAlpha = 0.3 + 0.7 * inten;
    const q = opts.text.replace(/\s+/g, ' ');
    const layers = [mk(), mk(), mk(), mk()];
    const xs = layers.map((L) => {
      const x = L.getContext('2d');
      x.font = font; x.textBaseline = 'top';
      x.globalAlpha = eAlpha; x.fillStyle = opts.charColor;
      x.shadowColor = opts.charColor; x.shadowBlur = 3 * inten;
      return x;
    });
    const parts = [];
    let qi = 0;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      const i = r * cols + c;
      if (!mag[i] || mag[i] < eThresh) continue;
      let ch = q[qi++ % q.length]; while (ch === ' ') ch = q[qi++ % q.length];
      xs[(Math.random() * 4) | 0].fillText(ch, c * cellW, r * cellH);
      parts.push({ x: c * cellW, y: r * cellH, ch, a: eAlpha });
    }

    const state = { mode: 'idle', t0: 0, raf: 0 };

    const drawIdle = (t) => {
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(base, 0, 0);
      for (let k = 0; k < layers.length; k++) {
        const d = opts.shimmerDepth;
        ctx.globalAlpha = (1 - d) + d * (0.5 + 0.5 * Math.sin(t * 0.0016 * opts.shimmerSpeed + k * 1.7));
        ctx.drawImage(layers[k], 0, 0);
      }
      ctx.globalAlpha = 1;
    };

    // dispel: glyphs pulse in and out under a decaying envelope — each
    // reappearance weaker until they stop coming back — while the photo
    // fades fully out (no ghost). Noise-clustered per-glyph delays.
    const FADE_DUR = 2.6;
    const BG_START = 0.9, BG_DUR = 1.8;
    const startDispel = () => {
      if (state.mode !== 'idle') return;
      for (const p of parts) {
        p.dl = (0.5 + 0.5 * Math.sin(p.x * 0.011 + p.y * 0.017)) * 0.4 + Math.random() * 0.3;
        p.w = 4 + Math.random() * 4;    // pulse rate: period ~0.8–1.6s
      }
      state.mode = 'dispel';
      state.t0 = performance.now();
    };

    const drawDispel = (t) => {
      const u = (t - state.t0) / 1000;
      ctx.clearRect(0, 0, W, H);
      const bgA = u > BG_START ? Math.max(0, 1 - (u - BG_START) / BG_DUR) : 1;
      if (bgA > 0) {
        ctx.globalAlpha = bgA; ctx.drawImage(base, 0, 0); ctx.globalAlpha = 1;
      }
      ctx.font = font; ctx.textBaseline = 'top'; ctx.fillStyle = opts.charColor;
      let alive = false;
      for (const p of parts) {
        const tt = u - p.dl;
        let a = p.a;
        if (tt > 0) {
          const pulse = 0.5 + 0.5 * Math.sin(p.w * tt + Math.PI / 2);
          a = p.a * pulse * Math.max(0, 1 - tt / FADE_DUR);
        }
        if (a <= 0.01) continue;
        alive = true;
        ctx.globalAlpha = a;
        ctx.fillText(p.ch, p.x, p.y);
      }
      ctx.globalAlpha = 1;
      if (!alive && u > BG_START + BG_DUR) {
        state.mode = 'done';
        ctx.clearRect(0, 0, W, H);
        if (opts.onDispelled) opts.onDispelled();
      }
    };

    let last = 0;
    const loop = (t) => {
      if (destroyed) return;
      state.raf = requestAnimationFrame(loop);
      if (state.mode === 'idle') { if (t - last < 33) return; last = t; drawIdle(t); }
      else if (state.mode === 'dispel') drawDispel(t);
    };
    state.raf = requestAnimationFrame(loop);

    api = {
      dispel: startDispel,
      destroy: () => { destroyed = true; cancelAnimationFrame(state.raf); },
    };
  }

  return {
    dispel: () => api.dispel(),
    destroy: () => { destroyed = true; api.destroy(); },
  };
}

(function entranceBoot() {
  const q = new URLSearchParams(location.search).get('entrance');
  if (q === '0') return;
  if (q !== '1') {
    if (sessionStorage.getItem('archiveEntered')) return;
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  }
  const host = $('#entrance');
  host.hidden = false;
  entranceActive = true;

  const srcImg = new Image();
  srcImg.src = '/app/entrance-bg.jpg';
  let inst = null, dispelling = false;

  const dismiss = () => {           // shared by finish + failure paths
    host.hidden = true;
    entranceActive = false;
  };

  function cropToViewport(img) {    // center-crop at source resolution
    const va = window.innerWidth / window.innerHeight;
    const ia = img.width / img.height;
    let sx, sy, sw, sh;
    if (ia > va) { sh = img.height; sw = sh * va; sx = (img.width - sw) / 2; sy = 0; }
    else { sw = img.width; sh = sw / va; sx = 0; sy = (img.height - sh) / 2; }
    const c = document.createElement('canvas');
    c.width = Math.round(sw); c.height = Math.round(sh);
    c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, c.width, c.height);
    return c.toDataURL('image/jpeg', 0.92);
  }

  function build() {
    if (inst) inst.destroy();
    inst = createAsciiEntrance($('#entrance-canvas'), {
      src: cropToViewport(srcImg),
      text: ENTRANCE_TEXT,
      charSize: 12,
      shimmerSpeed: 3,
      shimmerDepth: 0.9,          // glyphs breathe between 10% and 100% opacity
      intensity: 0.5,
      width: window.innerWidth,
      veil: 'rgba(255,255,255,0.45)',
      charColor: '#000',
      onDispelled: () => {
        try { sessionStorage.setItem('archiveEntered', '1'); } catch (e) {}
        dismiss();
      },
    });
  }
  srcImg.onload = build;
  srcImg.onerror = dismiss;         // never trap the site behind a broken cover

  host.addEventListener('click', () => {
    if (!inst || dispelling) return;
    dispelling = true;
    host.classList.add('dispelling');   // transparent bg: the photo fade reveals the carousel
    inst.dispel();
  });

  let rz;
  window.addEventListener('resize', () => {
    if (!entranceActive || dispelling) return;
    clearTimeout(rz);
    rz = setTimeout(build, 250);
  });
})();
</script>
