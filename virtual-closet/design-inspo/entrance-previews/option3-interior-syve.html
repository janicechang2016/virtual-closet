<style>
  html, body { height: 100%; }
  body { margin: 0; background: #fff; font-family: Helvetica, Arial, sans-serif; color: #000; overflow: hidden; }
  .stage { position: relative; height: 100vh; }
  .site { position: absolute; inset: 0; display: flex; flex-direction: column; gap: 14px; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.2s ease; }
  .site.on { opacity: 1; }
  .site .wordmark { font-style: italic; font-size: 30px; letter-spacing: .01em; }
  .site p { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: #999; margin: 0; }
  .cover { position: absolute; inset: 0; z-index: 1; cursor: pointer; }
  /* the crop matches the viewport aspect, so stretching to exactly 100vw/100vh
     is distortion-free; !important beats the module's inline sizing */
  .cover canvas { display: block; width: 100vw !important; height: 100vh !important; }
  .enter { position: absolute; left: 50%; bottom: 6vh; transform: translateX(-50%); z-index: 2; font-style: italic; font-size: 15px; letter-spacing: .01em; cursor: pointer; transition: opacity .9s ease; background: rgba(255,255,255,0.88); padding: 8px 18px; white-space: nowrap; }
  .enter.off { opacity: 0; pointer-events: none; }
  .replay { position: fixed; right: 16px; bottom: 14px; z-index: 3; font-size: 9px; letter-spacing: .22em; text-transform: uppercase; color: #999; background: none; border: none; font-family: inherit; cursor: pointer; }
  .tag { position: fixed; left: 16px; bottom: 14px; z-index: 3; font-size: 9px; letter-spacing: .22em; text-transform: uppercase; color: #999; }
</style>

<script>
// ==== ascii-entrance.js, inlined verbatim (export keyword removed) ====
const DEFAULT_TEXT =
  'We are all filled with a longing for the wild. There are few culturally sanctioned antidotes for this yearning. We were taught to feel shame for this desire. We grew our hair long and used it to hide our feelings. But the shadow of the Wild Woman still lurks behind us during our days and in our nights. No matter where we are, the shadow that trots behind is definitely four-footed. ';

function createAsciiEntrance(canvas, options = {}) {
  const opts = {
    src: options.src,
    text: options.text ?? DEFAULT_TEXT,
    charSize: options.charSize ?? 7,
    shimmerSpeed: options.shimmerSpeed ?? 2.2,
    shimmerDepth: options.shimmerDepth ?? 0.5, // how far layer opacity dips: 1-depth..1
    intensity: options.intensity ?? 0.5,
    width: options.width ?? null,
    veil: options.veil ?? 'rgba(242,239,230,0.30)',
    charColor: options.charColor ?? '#fffdf4',
    ghostAlpha: options.ghostAlpha ?? 0.12,
    clickToDispel: options.clickToDispel ?? true,
    onDispelled: options.onDispelled ?? null,
    fontFamily: options.fontFamily ?? "'IBM Plex Mono', monospace",
  };

  let api = { dispel: () => {}, reset: () => {}, destroy: () => {} };
  let destroyed = false;

  const img = new Image();
  img.onload = () => {
    const fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
    fontsReady.then(() => { if (!destroyed) boot(img); });
  };
  img.src = opts.src;

  function boot(img) {
    const cssW = opts.width || canvas.clientWidth || 420;
    const W = cssW * 2;
    const H = Math.round(W * (img.height / img.width));
    canvas.width = W; canvas.height = H;
    canvas.style.width = cssW + 'px';
    canvas.style.height = (H / 2) + 'px';
    canvas.style.pointerEvents = 'auto';
    const ctx = canvas.getContext('2d');

    const fs = opts.charSize * 2;
    const font = fs + 'px ' + opts.fontFamily;
    const cellW = Math.max(4, Math.round(fs * 0.6));
    const cellH = Math.max(6, Math.round(fs * 1.02));
    const cols = Math.ceil(W / cellW), rows = Math.ceil(H / cellH);

    const sc = document.createElement('canvas'); sc.width = cols; sc.height = rows;
    const sx = sc.getContext('2d', { willReadFrequently: true });
    sx.drawImage(img, 0, 0, cols, rows);
    const px = sx.getImageData(0, 0, cols, rows).data;
    const lum = new Float32Array(cols * rows);
    for (let i = 0; i < cols * rows; i++)
      lum[i] = (0.299 * px[i * 4] + 0.587 * px[i * 4 + 1] + 0.114 * px[i * 4 + 2]) / 255;

    const sorted = Float32Array.from(lum).sort();
    const lo = sorted[Math.floor(sorted.length * 0.02)];
    const hi = sorted[Math.floor(sorted.length * 0.98)];
    const rng = Math.max(0.05, hi - lo);
    for (let i = 0; i < lum.length; i++) lum[i] = Math.min(1, Math.max(0, (lum[i] - lo) / rng));

    const mag = new Float32Array(cols * rows);
    for (let r = 1; r < rows - 1; r++) for (let c = 1; c < cols - 1; c++) {
      const i = r * cols + c;
      const gx = (lum[i - cols + 1] + 2 * lum[i + 1] + lum[i + cols + 1]) - (lum[i - cols - 1] + 2 * lum[i - 1] + lum[i + cols - 1]);
      const gy = (lum[i + cols - 1] + 2 * lum[i + cols] + lum[i + cols + 1]) - (lum[i - cols - 1] + 2 * lum[i - cols] + lum[i - cols + 1]);
      mag[i] = Math.sqrt(gx * gx + gy * gy);
    }

    const mk = () => { const c = document.createElement('canvas'); c.width = W; c.height = H; return c; };

    const base = mk(), bx = base.getContext('2d');
    bx.drawImage(img, 0, 0, W, H);
    bx.fillStyle = opts.veil;
    bx.fillRect(0, 0, W, H);

    const inten = opts.intensity;
    const eThresh = 0.3 + (1 - inten) * 0.45;
    const eAlpha = 0.3 + 0.7 * inten;
    const q = opts.text.replace(/\s+/g, ' ');
    const layers = [mk(), mk(), mk(), mk()];
    const xs = layers.map(L => {
      const x = L.getContext('2d');
      x.font = font; x.textBaseline = 'top';
      x.globalAlpha = eAlpha; x.fillStyle = opts.charColor;
      x.shadowColor = opts.charColor; x.shadowBlur = 3 * inten;
      return x;
    });
    const parts = [];
    let qi = 0;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      const i = r * cols + c;
      if (!mag[i] || mag[i] < eThresh) continue;
      let ch = q[qi++ % q.length]; while (ch === ' ') ch = q[qi++ % q.length];
      const k = (Math.random() * 4) | 0;
      xs[k].fillText(ch, c * cellW, r * cellH);
      parts.push({ x: c * cellW, y: r * cellH, ch, a: eAlpha });
    }

    const state = { mode: 'idle', t0: 0, raf: 0 };

    const drawIdle = (t) => {
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(base, 0, 0);
      for (let k = 0; k < layers.length; k++) {
        const d = opts.shimmerDepth;
        ctx.globalAlpha = (1 - d) + d * (0.5 + 0.5 * Math.sin(t * 0.0016 * opts.shimmerSpeed + k * 1.7));
        ctx.drawImage(layers[k], 0, 0);
      }
      ctx.globalAlpha = 1;
    };

    // Dispel reworked (Janice 07-15): glyphs pulse in and out under a decaying
    // envelope — each reappearance weaker than the last until they stop coming
    // back — while the photo fades fully to white as the pulses die out.
    // End state is the clean white void (no ghost). Per-glyph noise-clustered
    // delay (0–0.7s) and a randomized pulse rate keep the field organic.
    const FADE_DUR = 2.6;                 // per-glyph envelope (s)
    const BG_START = 0.9, BG_DUR = 1.8;   // photo → white, once pulses weaken
    const startDispel = () => {
      if (state.mode !== 'idle') return;
      for (const p of parts) {
        p.dl = (0.5 + 0.5 * Math.sin(p.x * 0.011 + p.y * 0.017)) * 0.4 + Math.random() * 0.3;
        p.w = 4 + Math.random() * 4;      // pulse rate (rad/s): period ~0.8–1.6s
      }
      state.mode = 'dispel';
      state.t0 = performance.now();
    };

    const drawDispel = (t) => {
      const u = (t - state.t0) / 1000;
      ctx.clearRect(0, 0, W, H);
      const bgA = u > BG_START ? Math.max(0, 1 - (u - BG_START) / BG_DUR) : 1;
      if (bgA > 0) {
        ctx.globalAlpha = bgA; ctx.drawImage(base, 0, 0); ctx.globalAlpha = 1;
      }
      ctx.font = font; ctx.textBaseline = 'top'; ctx.fillStyle = opts.charColor;
      let alive = false;
      for (const p of parts) {
        const tt = u - p.dl;
        let a = p.a;
        if (tt > 0) {
          const pulse = 0.5 + 0.5 * Math.sin(p.w * tt + Math.PI / 2); // starts at peak
          a = p.a * pulse * Math.max(0, 1 - tt / FADE_DUR);
        }
        if (a <= 0.01) continue;
        alive = true;
        ctx.globalAlpha = a;
        ctx.fillText(p.ch, p.x, p.y);
      }
      ctx.globalAlpha = 1;
      if (!alive && u > BG_START + BG_DUR) {
        state.mode = 'done';
        ctx.clearRect(0, 0, W, H); // pure white void, no ghost
        canvas.style.pointerEvents = 'none';
        if (opts.onDispelled) opts.onDispelled();
      }
    };

    let last = 0;
    const loop = (t) => {
      if (destroyed) return;
      state.raf = requestAnimationFrame(loop);
      if (state.mode === 'idle') { if (t - last < 33) return; last = t; drawIdle(t); }
      else if (state.mode === 'dispel') drawDispel(t);
    };
    state.raf = requestAnimationFrame(loop);

    const onClick = () => startDispel();
    if (opts.clickToDispel) canvas.addEventListener('click', onClick);

    api = {
      dispel: startDispel,
      reset: () => { state.mode = 'idle'; canvas.style.pointerEvents = 'auto'; },
      destroy: () => {
        destroyed = true;
        cancelAnimationFrame(state.raf);
        canvas.removeEventListener('click', onClick);
      },
    };
  }

  return {
    dispel: (...a) => api.dispel(...a),
    reset: () => api.reset(),
    destroy: () => { destroyed = true; api.destroy(); },
  };
}
// ==== end module ====

let entrance = null;
let done = false;

function cropToViewport(img) {
  const va = window.innerWidth / window.innerHeight;
  const ia = img.width / img.height;
  let sx, sy, sw, sh;
  if (ia > va) { sh = img.height; sw = sh * va; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = sw / va; sx = 0; sy = (img.height - sh) / 2; }
  const c = document.createElement('canvas');
  c.width = Math.round(sw); c.height = Math.round(sh);
  c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, c.width, c.height);
  return c.toDataURL('image/jpeg', 0.92);
}

function build() {
  if (entrance) entrance.destroy();
  entrance = createAsciiEntrance(canvas, {
    src: cropToViewport(srcImg),
    charSize: 12,
    shimmerSpeed: 3,
    shimmerDepth: 0.9, // glyphs breathe between 10% and 100% opacity
    width: window.innerWidth,
    veil: 'rgba(255,255,255,0.45)',
    charColor: '#000',
    clickToDispel: false,
    onDispelled: () => { done = true; site.classList.add('on'); },
  });
}

srcImg.onload = build;

cover.addEventListener('click', () => {
  if (done) return;
  entrance.dispel();
  enter.classList.add('off');
});
enter.addEventListener('click', () => cover.click());

  if (done) return; // site already revealed; don't resurrect the cover
  clearTimeout(rz);
  rz = setTimeout(() => { enter.classList.remove('off'); build(); }, 250);
});

document.getElementById('replay').addEventListener('click', () => {
  done = false;
  site.classList.remove('on');
  enter.classList.remove('off');
  build();
});
</script>
</body>
</html>
