<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASCII Entrance — example</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #e7e3d5; font-family: 'IBM Plex Mono', monospace; color: #2f3a28; }
  .stage { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  /* the "site" underneath — replace with your real content */
  .site { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.2s ease; }
  .site.on { opacity: 1; }
  .site p { font-size: 13px; letter-spacing: .14em; text-transform: uppercase; }
  .cover { position: relative; z-index: 1; width: min(560px, 92vw); cursor: pointer; box-shadow: 0 18px 50px rgba(47,58,40,.16); }
  .cover canvas { display: block; width: 100%; }
</style>
</head>
<body>
<div class="stage">
  <div class="site" id="site"><p>your site content here</p></div>
  <div class="cover"><canvas id="entrance"></canvas></div>
</div>
<script type="module">
  import { createAsciiEntrance } from './ascii-entrance.js';
  createAsciiEntrance(document.getElementById('entrance'), {
    src: './interior.jpeg',
    onDispelled: () => document.getElementById('site').classList.add('on'),
  });
</script>
</body>
</html>
